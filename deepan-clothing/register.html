<div class="login-page">
  <div class="container">
    <div class="login-wrapper">
      <div class="login-header">
        <h1>Create Account</h1>
        <p>Join Deepan Clothing today</p>
      </div>
      <form class="login-form" id="registerForm">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="registerName" placeholder="Enter your full name" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="registerEmail" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label>Phone Number (10 digits)</label>
          <input type="tel" id="registerPhone" placeholder="Enter your 10-digit phone number" required pattern="[0-9]{10}" maxlength="10" />
        </div>
        <div class="form-group">
          <label>Address</label>
          <input type="text" id="registerAddress" placeholder="Enter your address" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Create a password" required minlength="6" />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input type="password" id="registerConfirmPassword" placeholder="Confirm your password" required minlength="6" />
        </div>
        <button type="submit" class="login-submit">Create Account</button>
      </form>
      <div class="login-footer">
        <p>Already have an account? <a href="login.html">Sign In</a></p>
      </div>
    </div>
  </div>
</div>

<script src="script.js"></script>
<script src="auth.js"></script>
</body>
